services:
  music-ui:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # data/ dir lives on the host so the DB survives container rebuilds
      - ./data:/app/data
    environment:
      # Required for Sync action
      DISCOGS_TOKEN: ${DISCOGS_TOKEN:-}
      # Required for Fetch Lyrics action
      GENIUS_TOKEN: ${GENIUS_TOKEN:-}
      # Required only for Claude summarise mode
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Ollama - host.docker.internal lets the container reach Ollama on the host machine
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      DB_PATH: /app/data/music.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Cloudflare Tunnel for external HTTPS access.
  # Set TUNNEL_TOKEN in your .env file (from the Cloudflare Zero Trust dashboard).
  # Comment out this service if you don't need external access.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - music-ui
    profiles:
      - tunnel
